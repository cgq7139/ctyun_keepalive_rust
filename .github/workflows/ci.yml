name: CI

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [published, created]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      run: |
        rustup toolchain install stable --profile minimal
        rustup default stable

    - name: Check formatting
      run: cargo fmt --all --check

    - name: Run clippy
      run: cargo clippy -- -D warnings

    - name: Run tests
      run: cargo test

    - name: Build (debug)
      run: cargo build

  build-windows:
    needs: build-and-test
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            artifact_name: ctyun_keepalive-windows-x64.exe
          - target: i686-pc-windows-msvc
            artifact_name: ctyun_keepalive-windows-x86.exe

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      run: |
        rustup toolchain install stable --profile minimal
        rustup default stable
        rustup target add ${{ matrix.target }}

    - name: Build release
      run: cargo build --release --target ${{ matrix.target }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: target/${{ matrix.target }}/release/ctyun_keepalive.exe

  build-linux:
    needs: build-and-test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact_name: ctyun_keepalive-linux-x64
          - target: i686-unknown-linux-gnu
            artifact_name: ctyun_keepalive-linux-x86

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      run: |
        rustup toolchain install stable --profile minimal
        rustup default stable
        rustup target add ${{ matrix.target }}

    - name: Build release
      run: cargo build --release --target ${{ matrix.target }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: target/${{ matrix.target }}/release/ctyun_keepalive

  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create release assets list
      run: |
        mkdir -p release-assets
        # 遍历每个 artifact 目录，保留原始 artifact 名称
        for artifact_dir in artifacts/*/; do
          artifact_name=$(basename "$artifact_dir")
          file=$(find "$artifact_dir" -type f -name "ctyun_keepalive*" | head -1)
          if [ -n "$file" ]; then
            cp "$file" "release-assets/$artifact_name"
          fi
        done
        ls -la release-assets/

    - name: Upload release assets
      uses: softprops/action-gh-release@v1
      with:
        files: release-assets/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
